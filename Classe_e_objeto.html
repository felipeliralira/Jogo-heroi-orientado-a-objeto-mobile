<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aula 1: Criando Objetos com Inputs</title>
    <link rel="stylesheet" href="./Classe_e_objeto.css">
</head>
<body>

    <h2> Criador de Heróis - Módulo 1</h2>
    <div class="caixa">
        <label>Nome do Herói:</label>
        <input type="text" id="nomeInput" placeholder="Ex: Aragorn">

        <label>Classe:</label>
        <select id="classeSelect">
            <option value="Guerreiro">Guerreiro</option>
            <option value="Mago">Mago</option>
        </select>

        <button onclick="criarHeroi()">Cria Herói</button>
    </div>

    <div class="caixa" id="resultado" style="display:none;">
        <h3>Herói Criado com Sucesso!</h3>
        <p id="dadosHeroi"></p>
    </div>

    <script src="./Classe_e_objeto.js">
       
    </script>
</body>
</html>
